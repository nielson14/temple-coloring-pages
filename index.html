<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Utah Temples · Color by Sticker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Georgia', serif;
  background: #f5f0eb;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
header {
  background: #2c2c2c;
  color: #f5f0eb;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
header h1 {
  font-size: 0.95rem;
  letter-spacing: 0.08em;
  font-weight: normal;
  white-space: nowrap;
}
header h1 span { color: #c8a96e; }
.header-right {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.progress-pill {
  background: #3d3d3d;
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.75rem;
  color: #c8a96e;
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.btn {
  background: none;
  border: 1px solid #c8a96e;
  color: #c8a96e;
  border-radius: 4px;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 0.75rem;
  letter-spacing: 0.04em;
  transition: all 0.15s;
  font-family: Georgia, serif;
  white-space: nowrap;
}
.btn:hover { background: #c8a96e; color: #2c2c2c; }
.btn.active { background: #c8a96e; color: #2c2c2c; }
.btn:disabled { opacity: 0.3; cursor: default; }
.btn:disabled:hover { background: none; color: #c8a96e; }

/* ── Temple Switcher ── */
#temple-nav {
  background: #1e1e1e;
  display: flex;
  border-bottom: 1px solid #3a3a3a;
  flex-shrink: 0;
  overflow-x: auto;
}
.temple-tab {
  flex: 1;
  min-width: 0;
  padding: 10px 12px;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  color: #888;
  cursor: pointer;
  font-family: Georgia, serif;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  white-space: nowrap;
  text-overflow: ellipsis;
  overflow: hidden;
  transition: all 0.2s;
  text-align: center;
}
.temple-tab:hover { color: #c8a96e; background: #252525; }
.temple-tab.active {
  color: #c8a96e;
  border-bottom-color: #c8a96e;
  background: #252525;
}
.temple-tab .tab-progress {
  display: block;
  font-size: 0.65rem;
  color: #666;
  margin-top: 2px;
  letter-spacing: 0.03em;
}
.temple-tab.active .tab-progress { color: #a07845; }

/* ── Canvas ── */
#canvas-wrap {
  flex: 1;
  overflow: auto;
  background: #e8e3dc;
  position: relative;
  cursor: crosshair;
  min-height: 0;
}
#svg-container {
  width: 100%;
  display: block;
}
#svg-container svg { display: block; }
#svg-container [data-region] {
  cursor: pointer;
  transition: filter 0.08s;
}
#svg-container [data-region]:hover { filter: brightness(0.87); }
@keyframes flash-fill {
  0%   { filter: brightness(1.7); }
  100% { filter: brightness(1); }
}
.flash-fill { animation: flash-fill 0.3s ease-out; }

/* ── Palette Panel ── */
#palette-panel {
  background: #2c2c2c;
  padding: 10px 14px 12px;
  flex-shrink: 0;
}
#active-color-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
#active-swatch {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid #555;
  flex-shrink: 0;
}
#active-label {
  font-size: 0.8rem;
  color: #ccc;
  flex: 1;
}
#color-palette {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}
.color-swatch {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  flex-shrink: 0;
}
.color-swatch:hover { transform: scale(1.18); }
.color-swatch.selected {
  box-shadow: 0 0 0 2px #fff, 0 0 0 4px #c8a96e;
  transform: scale(1.15);
}
.color-swatch.light-border { border-color: #666; }

/* ── Zoom ── */
#zoom-controls {
  position: fixed;
  bottom: 130px;
  right: 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 50;
}
.zoom-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: none;
  background: rgba(44,44,44,0.92);
  color: #c8a96e;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.zoom-btn:hover { background: #3d3d3d; }

/* ── Modal ── */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 400;
  align-items: center;
  justify-content: center;
}
#modal-overlay.show { display: flex; }
#modal-box {
  background: #2c2c2c;
  border: 1px solid #c8a96e;
  border-radius: 8px;
  padding: 28px 32px;
  text-align: center;
  max-width: 320px;
  width: 90%;
}
#modal-box h3 { color: #c8a96e; font-size: 1.05rem; margin-bottom: 10px; }
#modal-box p { color: #ccc; font-size: 0.85rem; margin-bottom: 22px; line-height: 1.5; }
.modal-btns { display: flex; gap: 12px; justify-content: center; }
.modal-btns .btn { padding: 7px 22px; font-size: 0.85rem; }
.btn-danger { background: #7a3030; border-color: #7a3030; color: #fff; }
.btn-danger:hover { background: #943838; border-color: #943838; color: #fff; }

/* ── Completion ── */
#completion-banner {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(44,44,44,0.94);
  z-index: 200;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 40px;
}
#completion-banner.show { display: flex; }
#completion-banner h2 { color: #c8a96e; font-size: 1.9rem; margin-bottom: 10px; }
#completion-banner p { color: #ddd; font-size: 0.9rem; margin-bottom: 8px; line-height: 1.6; max-width: 300px; }
#completion-name { color: #c8a96e; font-size: 1rem; margin-bottom: 22px; }

/* ── Tooltip ── */
#tooltip {
  position: fixed;
  background: #1a1a1a;
  color: #e8e0d0;
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 0.72rem;
  pointer-events: none;
  z-index: 300;
  opacity: 0;
  transition: opacity 0.12s;
  white-space: nowrap;
}
#tooltip.show { opacity: 1; }
body.erase-mode #canvas-wrap { cursor: cell; }
</style>
</head>

<header>
  <h1>UTAH TEMPLES &nbsp;·&nbsp; <span id="header-temple-name">Color by Sticker</span></h1>
  <div class="header-right">
    <div class="progress-pill"><span id="filled-count">0</span> / <span id="total-count">0</span></div>
    <button class="btn" id="undo-btn" onclick="undo()" disabled>Undo</button>
    <button class="btn" id="erase-btn" onclick="toggleErase()">Erase</button>
    <button class="btn" onclick="confirmReset()">Reset</button>
  </div>
</header>

<nav id="temple-nav">
  <button class="temple-tab active" onclick="switchTemple(0)">

  <button class="temple-tab" onclick="switchTemple(2)">

</nav>

<div id="canvas-wrap">

</div>

<div id="palette-panel">

  </div>
  <div id="color-palette"></div>
</div>

<div id="zoom-controls">
  <button class="zoom-btn" onclick="zoom(1.3)" title="Zoom in">+</button>
  <button class="zoom-btn" onclick="zoom(0.77)" title="Zoom out">−</button>
  <button class="zoom-btn" onclick="resetZoom()" title="Fit" style="font-size:0.72rem;">Fit</button>
</div>

<div id="modal-overlay">

    <h3>Reset This Temple?</h3>
    <p>This will clear all colors for <strong id="modal-temple-name"></strong>. Other temples are not affected.</p>

  </div>
</div>

<div id="completion-banner">

</div>

<div id="tooltip"></div>

const PALETTE = [
  {"hex":"#ffffff","label":"Pure White"},
  {"hex":"#f9f7f4","label":"Snow"},
  {"hex":"#f1ede6","label":"Ivory"},
  {"hex":"#e8e0d0","label":"Linen"},
  {"hex":"#ddd5c4","label":"Parchment"},
  {"hex":"#cfc4b0","label":"Wheat"},
  {"hex":"#c2b49a","label":"Sand"},
  {"hex":"#b5a48a","label":"Tan"},
  {"hex":"#a69578","label":"Khaki"},
  {"hex":"#967f62","label":"Camel"},
  {"hex":"#856c50","label":"Fawn"},
  {"hex":"#e8e8e8","label":"Pale Gray"},
  {"hex":"#d4d4d4","label":"Silver"},
  {"hex":"#bdbdbd","label":"Light Gray"},
  {"hex":"#a8a8a8","label":"Gray"},
  {"hex":"#8e8e8e","label":"Medium Gray"},
  {"hex":"#747474","label":"Slate"},
  {"hex":"#5c5c5c","label":"Charcoal"},
  {"hex":"#3d3d3d","label":"Dark Slate"},
  {"hex":"#e6ddd0","label":"Warm Gray"},
  {"hex":"#d5c9b8","label":"Greige"},
  {"hex":"#c4b5a0","label":"Stone"},
  {"hex":"#b3a08a","label":"Taupe"},
  {"hex":"#e8c88a","label":"Warm Gold"},
  {"hex":"#d4a852","label":"Honey Gold"},
  {"hex":"#c8913a","label":"Amber"}
];

// ── State ──
let currentTemple = 0;
let selectedColor = PALETTE[0].hex;
let selectedLabel = PALETTE[0].label;
let eraseMode = false;
let scale = 1;

// Per-temple state: filledRegions[templeId] = {region: color}
//                   undoStack[templeId]     = [{region, prevColor}]
const filledRegions = {};
const undoStacks = {};
TEMPLES.forEach(t => { filledRegions[t.id] = {}; undoStacks[t.id] = []; });

// ── Boot ──
window.addEventListener('DOMContentLoaded', () => {
  buildPalette();
  selectColor(PALETTE[0].hex, PALETTE[0].label);
  loadAllProgress();
  updateAllTabProgress();
  switchTemple(0);
  window.addEventListener('resize', fitToCanvas);
});

// ── Temple Switching ──
function switchTemple(idx) {
  currentTemple = idx;
  const t = TEMPLES[idx];

  // Update tabs
  document.querySelectorAll('.temple-tab').forEach((tab, i) => {
    tab.classList.toggle('active', i === idx);
  });

  // Update header
  document.getElementById('header-temple-name').textContent = t.name;
  document.getElementById('total-count').textContent = t.totalRegions;

  // Inject SVG
  document.getElementById('svg-container').innerHTML = t.svg;

  // Re-apply saved colors for this temple
  const saved = filledRegions[t.id];
  Object.entries(saved).forEach(([region, color]) => {
    const el = document.getElementById(`region-${region}`);
    if (el) { el.style.fill = color; el.classList.add('colored'); }
  });

  // Attach handlers
  attachRegionHandlers();

  // Update undo button
  document.getElementById('undo-btn').disabled = undoStacks[t.id].length === 0;

  // Update progress counter
  updateProgress();

  // Reset zoom and fit
  scale = 1;
  document.getElementById('svg-container').style.transform = '';
  fitToCanvas();
}

// ── Region Handlers ──
function attachRegionHandlers() {
  document.querySelectorAll('[data-region]').forEach(el => {
    el.addEventListener('click', e => applyColor(e.currentTarget));
    el.addEventListener('touchstart', e => { e.preventDefault(); applyColor(e.currentTarget); }, { passive: false });
    el.addEventListener('mouseenter', handleHover);
    el.addEventListener('mouseleave', hideTooltip);
  });
}

function applyColor(el) {
  const tid = TEMPLES[currentTemple].id;
  const region = el.dataset.region;
  const prevColor = filledRegions[tid][region] || null;

  if (eraseMode) {
    if (!prevColor) return;
    undoStacks[tid].push({ region, prevColor });
    delete filledRegions[tid][region];
    el.style.fill = '';
    el.classList.remove('colored');
  } else {
    if (prevColor === selectedColor) return;
    undoStacks[tid].push({ region, prevColor });
    filledRegions[tid][region] = selectedColor;
    el.style.fill = selectedColor;
    el.classList.add('colored');
    el.classList.remove('flash-fill');
    void el.offsetWidth;
    el.classList.add('flash-fill');
  }

  if (undoStacks[tid].length > 150) undoStacks[tid].shift();
  document.getElementById('undo-btn').disabled = undoStacks[tid].length === 0;
  updateProgress();
  updateTabProgress(currentTemple);
  saveProgress(tid);
  if (!eraseMode) checkCompletion();
}

function handleHover(e) {
  const tid = TEMPLES[currentTemple].id;
  const region = e.currentTarget.dataset.region;
  const color = filledRegions[tid][region];
  showTooltip(e, color ? colorLabel(color) : 'Tap to color');
}

// ── Undo ──
function undo() {
  const tid = TEMPLES[currentTemple].id;
  const stack = undoStacks[tid];
  if (!stack.length) return;
  const { region, prevColor } = stack.pop();
  const el = document.getElementById(`region-${region}`);
  if (!el) return;
  if (prevColor === null) {
    delete filledRegions[tid][region];
    el.style.fill = '';
    el.classList.remove('colored');
  } else {
    filledRegions[tid][region] = prevColor;
    el.style.fill = prevColor;
    el.classList.add('colored');
  }
  document.getElementById('undo-btn').disabled = stack.length === 0;
  updateProgress();
  updateTabProgress(currentTemple);
  saveProgress(tid);
}

// ── Erase ──
function toggleErase() {
  eraseMode = !eraseMode;
  document.getElementById('erase-btn').classList.toggle('active', eraseMode);
  document.body.classList.toggle('erase-mode', eraseMode);
  if (eraseMode) {
    document.getElementById('active-label').textContent = 'Eraser — tap a region to clear it';
    document.querySelectorAll('.color-swatch').forEach(sw => sw.classList.remove('selected'));
    document.getElementById('active-swatch').style.background = '#555';
  } else {
    selectColor(selectedColor, selectedLabel);
  }
}

// ── Reset ──
function confirmReset() {
  document.getElementById('modal-temple-name').textContent = TEMPLES[currentTemple].name;
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
function doReset() {
  closeModal();
  const tid = TEMPLES[currentTemple].id;
  filledRegions[tid] = {};
  undoStacks[tid] = [];
  document.querySelectorAll('[data-region]').forEach(el => {
    el.style.fill = '';
    el.style.removeProperty('fill');
    el.classList.remove('colored', 'flash-fill');
  });
  document.getElementById('undo-btn').disabled = true;
  updateProgress();
  updateTabProgress(currentTemple);
  saveProgress(tid);
}

// ── Progress ──
function updateProgress() {
  const tid = TEMPLES[currentTemple].id;
  document.getElementById('filled-count').textContent = Object.keys(filledRegions[tid]).length;
}

function updateTabProgress(idx) {
  const t = TEMPLES[idx];
  const count = Object.keys(filledRegions[t.id]).length;
  const el = document.getElementById(`tab-prog-${idx}`);
  if (el) el.textContent = `${count} / ${t.totalRegions}`;
}

function updateAllTabProgress() {
  TEMPLES.forEach((_, i) => updateTabProgress(i));
}

function checkCompletion() {
  const t = TEMPLES[currentTemple];
  if (Object.keys(filledRegions[t.id]).length >= t.totalRegions) {
    document.getElementById('completion-name').textContent = t.name;
    setTimeout(() => document.getElementById('completion-banner').classList.add('show'), 700);
  }
}

// ── Persistence ──
function saveProgress(tid) {
  try { localStorage.setItem(`temple-${tid}`, JSON.stringify(filledRegions[tid])); } catch(e) {}
}
function loadAllProgress() {
  TEMPLES.forEach(t => {
    try {
      const saved = localStorage.getItem(`temple-${t.id}`);
      if (saved) filledRegions[t.id] = JSON.parse(saved);
    } catch(e) {}
  });
}

// ── Palette ──
function buildPalette() {
  const el = document.getElementById('color-palette');
  PALETTE.forEach(color => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    if (isLight(color.hex)) sw.classList.add('light-border');
    sw.style.background = color.hex;
    sw.dataset.color = color.hex;
    sw.title = color.label;
    sw.addEventListener('click', () => selectColor(color.hex, color.label));
    sw.addEventListener('mouseenter', e => showTooltip(e, color.label));
    sw.addEventListener('mouseleave', hideTooltip);
    el.appendChild(sw);
  });
}

function isLight(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114)/1000 > 180;
}

function selectColor(hex, label) {
  selectedColor = hex; selectedLabel = label;
  eraseMode = false;
  document.getElementById('erase-btn').classList.remove('active');
  document.body.classList.remove('erase-mode');
  const sw = document.getElementById('active-swatch');
  sw.style.background = hex;
  sw.style.borderColor = isLight(hex) ? '#777' : hex;
  document.getElementById('active-label').textContent = label;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('selected', s.dataset.color === hex));
}

function colorLabel(hex) { return (PALETTE.find(p => p.hex === hex) || {}).label || hex; }

// ── Zoom ──
function zoom(f) {
  scale = Math.max(0.3, Math.min(6, scale * f));
  document.getElementById('svg-container').style.transform = `scale(${scale})`;
}
function resetZoom() {
  scale = 1;
  document.getElementById('svg-container').style.transform = '';
  fitToCanvas();
}
function fitToCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const svg = document.querySelector('#svg-container svg');
  if (!svg) return;
  const vb = svg.getAttribute('viewBox');
  if (!vb) return;
  const svgW = parseFloat(vb.split(' ')[2]);
  if (wrap.clientWidth < svgW) {
    scale = wrap.clientWidth / svgW;
    const c = document.getElementById('svg-container');
    c.style.transform = `scale(${scale})`;
    c.style.transformOrigin = 'top left';
    c.style.width = svgW + 'px';
  }
}

// ── Tooltip ──
const tipEl = document.getElementById('tooltip');
function showTooltip(e, text) { tipEl.textContent = text; tipEl.classList.add('show'); }
function hideTooltip() { tipEl.classList.remove('show'); }
document.addEventListener('mousemove', e => {
  tipEl.style.left = (e.clientX + 14) + 'px';
  tipEl.style.top  = (e.clientY - 28) + 'px';
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
</script>
